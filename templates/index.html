                        row.insertAdjacentHTML('beforeend', placeholderHtml);
                        renderIndicators();
                        scheduleDeleteHide();
                        const placeholder = row.querySelector(`.video-container[data-video-id="${containerId}"]`);
                        const bar = placeholder ? placeholder.querySelector('.upload-bar') : null;
                        const label = placeholder ? placeholder.querySelector('.upload-text') : null;

                        const formData = new FormData();
                        formData.append("video", file);

                        const xhr = new XMLHttpRequest();
                        xhr.open("POST", `${UPLOAD_BASE}/upload_video`, true);
                        let _lastTime = Date.now();
                        let _lastLoaded = 0;

                        xhr.upload.onprogress = function (evt) {
                            if ((!bar && !label) || !evt.lengthComputable) return;
                            const pct = Math.round((evt.loaded / evt.total) * 100);
                            if (bar) bar.style.width = pct + '%';
                            if (label) {
                                const now = Date.now();
                                const dt = Math.max(1, now - _lastTime) / 1000;
                                const dBytes = Math.max(0, evt.loaded - _lastLoaded);
                                const speed = dBytes / dt;
                                const remaining = Math.max(0, evt.total - evt.loaded);
                                const eta = speed > 0 ? Math.ceil(remaining / speed) : 0;
                                label.textContent = `${formatBytes(evt.loaded)} / ${formatBytes(evt.total)} • ${formatBytes(speed)}/s • ${formatETA(eta)}`;
                                _lastTime = now;
                                _lastLoaded = evt.loaded;
                            }
                        };
                        xhr.onload = function () {
                            if (!placeholder) {
                                resolve();
                                return;
                            }
                            if (xhr.status >= 200 && xhr.status < 300) {
                                let data = null;
                                try { data = JSON.parse(xhr.responseText); } catch (e) { }
                                const url = data && data.url ? data.url : null;
                                if (!url) {
                                    placeholder.remove();
                                    resolve();
                                    return;
                                }
                                placeholder.querySelector('.video-card').innerHTML = `
                                    <button class="video-delete" onclick="deleteVideo(this)">✕</button>
                    <button class="video-audio-toggle" onclick="toggleLocalVideoAudio(this)"><i data-lucide="volume-2"></i></button>
                                    <video src="${url}" controls playsinline></video>
                                    <a class="video-download" href="${url}" download>Download</a>
                                `;
                                const localVideo = placeholder.querySelector('video');
                                setupLocalVideoPreview(localVideo);
                                renderIndicators();
                                scheduleDeleteHide();
                                ensureVideoObserver();
                                saveServer();
                                resolve();
                            } else {
                                placeholder.remove();
                                resolve();
                            }
                        };
                        xhr.onerror = function () {
                            if (placeholder) placeholder.remove();
                            resolve();
                        };
                        xhr.send(formData);
                    });
                }
            }
            this.value = ""; // Reset
        });

        function formatBytes(bytes) {
            if (!bytes || bytes <= 0) return "0 MB";
            const units = ["B", "KB", "MB", "GB", "TB"];
            const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
            const val = bytes / Math.pow(1024, i);
            const digits = val >= 100 ? 0 : val >= 10 ? 1 : 2;
            return `${val.toFixed(digits)} ${units[i]}`;
        }

        function formatETA(seconds) {
            if (!seconds || seconds <= 0) return "0s";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            if (m <= 0) return `${s}s`;
            return `${m}m ${s}s`;
        }

        const musicState = {
            tracks: [],
            currentId: null,
            selectMode: false,
            selectedIds: new Set(),
            downloading: false,
            uploading: false,
            docName: "global"
        };

        const musicUploadState = {
            hiddenByUser: false,
            totalFiles: 0,
            completedFiles: 0,
            totalBytes: 0,
            completedBytes: 0,
            inFlight: {}
        };

        function buildTrackFromPayload(payload) {
            return {
                id: payload.id,
                name: payload.name || payload.original_name || "Audio",
                size: Number(payload.size) || 0,
                url: payload.url,
                downloadUrl: payload.download_url || payload.downloadUrl || payload.url,
                status: "Ready",
                audio: null,
                card: null,
                playIcon: null,
                playLabel: null,
                progressFill: null,
                progressTrack: null,
                timeLabel: null,
                checkbox: null,
                downloadStatusEl: null
            };
        }

        function loadMusicForDoc(docName) {
            const targetDoc = (docName || current || "global").trim() || "global";
            musicState.docName = targetDoc;
            const params = new URLSearchParams({ doc: targetDoc });
            fetch(`/music_tracks?${params.toString()}`)
                .then(res => res.json())
                .then(data => {
                    if (!Array.isArray(data)) throw new Error("Invalid track data");
                    musicState.tracks = data.map(buildTrackFromPayload);
                    musicState.currentId = null;
                    renderMusicTracks();
                })
                .catch(() => updateMusicStatusLabel("Could not load music library"));
        }

        function initMusicSection() {
            const helpers = {
                upload: document.getElementById("musicUploadBtn"),
                selectMode: document.getElementById("musicSelectModeBtn"),
                selectAll: document.getElementById("musicSelectAllBtn"),
                invert: document.getElementById("musicInvertSelectionBtn"),
                deleteSelected: document.getElementById("musicDeleteSelectedBtn"),
                deleteAll: document.getElementById("musicDeleteAllBtn"),
                downloadSelected: document.getElementById("musicDownloadSelectedBtn"),
                downloadAll: document.getElementById("musicDownloadAllBtn"),
                input: document.getElementById("musicUploadInput")
            };
            helpers.upload?.addEventListener("click", () => helpers.input?.click());
            helpers.input?.addEventListener("change", handleMusicUpload);
            helpers.selectMode?.addEventListener("click", toggleMusicSelectMode);
            helpers.selectAll?.addEventListener("click", selectAllMusicTracks);
            helpers.invert?.addEventListener("click", invertMusicSelection);
            helpers.deleteSelected?.addEventListener("click", deleteSelectedMusic);
            helpers.deleteAll?.addEventListener("click", deleteAllMusic);
            helpers.downloadSelected?.addEventListener("click", () => handleMusicDownloads(getSelectedMusicTracks()));
            helpers.downloadAll?.addEventListener("click", () => handleMusicDownloads([...musicState.tracks]));
            ensureMusicSectionVisibility();
            loadMusicForDoc(current || "global");

            document.getElementById("musicUploadCloseBtn")?.addEventListener("click", () => {
                musicUploadState.hiddenByUser = true;
                hideMusicUploadModal();
            });
        }

        function showMusicUploadModal() {
            if (musicUploadState.hiddenByUser) return;
            document.getElementById("musicUploadModal")?.classList.add("show");
        }

        function hideMusicUploadModal() {
            document.getElementById("musicUploadModal")?.classList.remove("show");
        }

        function updateMusicUploadModal() {
            const fill = document.getElementById("musicUploadFill");
            const meta = document.getElementById("musicUploadMeta");
            const title = document.getElementById("musicUploadTitle");
            if (!fill || !meta || !title) return;
            const inFlightLoaded = Object.values(musicUploadState.inFlight).reduce((sum, n) => sum + (Number(n) || 0), 0);
            const uploaded = musicUploadState.completedBytes + inFlightLoaded;
            const total = Math.max(1, musicUploadState.totalBytes);
            const pct = Math.max(0, Math.min(100, Math.round((uploaded / total) * 100)));
            fill.style.width = `${pct}%`;
            title.textContent = musicState.uploading ? "Uploading music" : "Upload complete";
            meta.textContent = `${musicUploadState.completedFiles}/${musicUploadState.totalFiles} files • ${formatBytes(uploaded)} / ${formatBytes(musicUploadState.totalBytes)} • ${pct}%`;
        }

        async function handleMusicUpload(event) {
            const files = Array.from(event.target?.files || []);
            if (!files.length) return;
            musicState.uploading = true;
            musicUploadState.hiddenByUser = false;
            musicUploadState.totalFiles = files.length;
            musicUploadState.completedFiles = 0;
            musicUploadState.totalBytes = files.reduce((sum, f) => sum + (Number(f.size) || 0), 0);
            musicUploadState.completedBytes = 0;
            musicUploadState.inFlight = {};

            showMusicUploadModal();
            updateMusicUploadModal();
            updateMusicStatusLabel(`Uploading ${files.length} track${files.length > 1 ? "s" : ""}...`);

            const batchSize = 4;
            for (let i = 0; i < files.length; i += batchSize) {
                const batch = files.slice(i, i + batchSize);
                await Promise.all(batch.map((file, idx) => {
                    const key = `${i + idx}:${file.name}`;
                    return uploadMusicFile(file, {
                        onProgress: (loaded) => {
                            musicUploadState.inFlight[key] = loaded;
                            updateMusicUploadModal();
                        },
                        onComplete: () => {
                            musicUploadState.completedFiles += 1;
                            musicUploadState.completedBytes += Number(file.size) || 0;
                            delete musicUploadState.inFlight[key];
                            updateMusicUploadModal();
                        }
                    });
                }));
            }

            musicState.uploading = false;
            updateMusicUploadModal();
            setTimeout(() => {
                hideMusicUploadModal();
            }, 900);
            event.target.value = "";
            updateMusicStatusLabel(`${musicState.tracks.length} track${musicState.tracks.length === 1 ? "" : "s"} ready`);
        }

        function uploadMusicFile(file, hooks = {}) {
            return new Promise(resolve => {
                const xhr = new XMLHttpRequest();
                const docParam = encodeURIComponent(musicState.docName || current || "global");
                xhr.open("POST", `/upload_file?doc=${docParam}`, true);
                xhr.upload.onprogress = function (evt) {
                    if (!evt.lengthComputable) return;
                    hooks.onProgress?.(evt.loaded, evt.total);
                };
                xhr.onload = function () {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try {
                            const payload = JSON.parse(xhr.responseText);
                            addMusicTrack(payload);
                        } catch (e) {
                            updateMusicStatusLabel("Upload failed");
                        }
                    } else {
                        updateMusicStatusLabel("Upload failed");
                    }
                    hooks.onComplete?.();
                    resolve();
                };
                xhr.onerror = function () {
                    updateMusicStatusLabel("Upload failed");
                    hooks.onComplete?.();
                    resolve();
                };
                const formData = new FormData();
                formData.append("file", file);
                xhr.send(formData);
            });
        }

        function addMusicTrack(info, options = {}) {
            if (!info || !info.url) return;
            const track = buildTrackFromPayload(info);
            musicState.tracks.push(track);
            renderMusicTracks();
            if (options.autoplay !== false && !musicState.currentId) {
                playMusicTrack(track);
            }
        }

        function renderMusicTracks() {
            const row = document.getElementById("musicRow");
            if (!row) return;
            row.innerHTML = "";
            musicState.tracks.forEach(track => row.appendChild(createMusicCard(track)));
            updateMusicSectionStatus();
            updateMusicGlobalIndicator();
            ensureMusicSectionVisibility();
            lucide.createIcons();
            applyMusicRowSelectMode();
        }

        function applyMusicRowSelectMode() {
            const row = document.getElementById("musicRow");
            if (!row) return;
            row.classList.toggle("select-mode", musicState.selectMode);
        }

        function createMusicCard(track) {
            const card = document.createElement("div");
            card.className = "music-card";
            card.dataset.id = track.id;
            card.innerHTML = `
                <label class="music-select">
                    <input type="checkbox">
                    Select
                </label>
                <div class="music-art">
                    <i data-lucide="music"></i>
                </div>
                <div class="music-meta">
                    <div class="music-title">${track.name}</div>
                    <div class="music-size">${formatBytes(track.size)}</div>
                </div>
                <button class="music-play-btn">
                    <i data-lucide="play"></i>
                    <span>Play</span>
                </button>
                <div class="music-progress-track">
                    <div class="music-progress-fill"></div>
                </div>
                <div class="music-progress-time">0:00 / 0:00</div>
                <div class="music-actions">
                    <button class="music-download-btn">
                        <i data-lucide="download"></i>
                        Download
                    </button>
                    <button class="music-delete-btn">
                        <i data-lucide="trash-2"></i>
                        Delete
                    </button>
                </div>
                <div class="music-download-status">${track.status}</div>
                <audio src="${track.url}" preload="metadata"></audio>
            `;
            const checkbox = card.querySelector("input[type=checkbox]");
            const playBtn = card.querySelector(".music-play-btn");
            const playIcon = playBtn?.querySelector("i");
            const playLabel = playBtn?.querySelector("span");
            const progressTrack = card.querySelector(".music-progress-track");
            const progressFill = card.querySelector(".music-progress-fill");
            const timeLabel = card.querySelector(".music-progress-time");
            const downloadBtn = card.querySelector(".music-download-btn");
            const deleteBtn = card.querySelector(".music-delete-btn");
            const downloadStatusEl = card.querySelector(".music-download-status");
            const audio = card.querySelector("audio");

            track.card = card;
            track.checkbox = checkbox;
            track.playIcon = playIcon;
            track.playLabel = playLabel;
            track.progressTrack = progressTrack;
            track.progressFill = progressFill;
            track.timeLabel = timeLabel;
            track.downloadStatusEl = downloadStatusEl;
            track.audio = audio;

            if (checkbox) {
                checkbox.checked = musicState.selectedIds.has(track.id);
                checkbox.addEventListener("change", () => updateMusicSelection(track.id, checkbox.checked));
            }
            playBtn?.addEventListener("click", () => toggleMusicPlay(track.id));
            progressTrack?.addEventListener("click", event => {
                if (!track.audio?.duration) return;
                const rect = progressTrack.getBoundingClientRect();
                const pct = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
                track.audio.currentTime = pct * track.audio.duration;
            });
            downloadBtn?.addEventListener("click", () => handleMusicDownloads([track]));
            deleteBtn?.addEventListener("click", () => {
                deleteMusicTrack(track.id).finally(() => loadMusicForDoc(musicState.docName));
            });

            audio?.addEventListener("loadedmetadata", () => updateMusicProgress(track));
            audio?.addEventListener("timeupdate", () => updateMusicProgress(track));
            audio?.addEventListener("ended", () => {
                playNextMusic(track.id);
            });

            return card;
        }

        function toggleMusicPlay(id) {
            const track = musicState.tracks.find(t => t.id === id);
            if (!track || !track.audio) return;
            if (musicState.currentId === id && !track.audio.paused) {
                pauseMusicTrack(track);
                return;
            }
            playMusicTrack(track);
        }

        function playMusicTrack(track) {
            if (!track.audio) return;
            pauseOtherMusic(track.id);
            track.audio.play().catch(() => { });
            musicState.currentId = track.id;
            track.card?.classList.add("is-playing");
            updateMusicButtons();
            updateMusicGlobalIndicator();
        }

        function pauseMusicTrack(track) {
            if (!track.audio) return;
            track.audio.pause();
            if (musicState.currentId === track.id) {
                musicState.currentId = null;
            }
            track.card?.classList.remove("is-playing");
            updateMusicButtons();
            updateMusicGlobalIndicator();
        }

        function pauseOtherMusic(exceptId) {
            musicState.tracks.forEach(track => {
                if (track.id !== exceptId && track.audio) {
                    track.audio.pause();
                    track.card?.classList.remove("is-playing");
                }
            });
        }

        function updateMusicButtons() {
            musicState.tracks.forEach(track => {
                const isPlaying = track.id === musicState.currentId && track.audio && !track.audio.paused;
                track.card?.classList.toggle("is-playing", isPlaying);
                if (track.playIcon) {
                    track.playIcon.dataset.lucide = isPlaying ? "pause" : "play";
                }
                if (track.playLabel) {
                    track.playLabel.textContent = isPlaying ? "Pause" : "Play";
                }
            });
            lucide.createIcons();
        }

        function updateMusicProgress(track) {
            if (!track || !track.audio) return;
            const duration = track.audio.duration || 0;
            const current = track.audio.currentTime || 0;
            const pct = duration ? (current / duration) * 100 : 0;
            if (track.progressFill) {
                track.progressFill.style.width = `${pct}%`;
            }
            if (track.timeLabel) {
                track.timeLabel.textContent = `${formatTime(current)} / ${formatTime(duration)}`;
            }
        }

        function toggleMusicSelectMode() {
            musicState.selectMode = !musicState.selectMode;
            const row = document.getElementById("musicRow");
            row?.classList.toggle("select-mode", musicState.selectMode);
            applyMusicRowSelectMode();
        }

        function selectAllMusicTracks() {
            musicState.selectMode = true;
            const row = document.getElementById("musicRow");
            row?.classList.add("select-mode");
            musicState.tracks.forEach(track => musicState.selectedIds.add(track.id));
            renderMusicTracks();
        }

        function invertMusicSelection() {
            const row = document.getElementById("musicRow");
            if (!row) return;
            musicState.selectMode = true;
            row.classList.add("select-mode");
            const next = new Set();
            musicState.tracks.forEach(track => {
                if (!musicState.selectedIds.has(track.id)) {
                    next.add(track.id);
                }
            });
            musicState.selectedIds = next;
            renderMusicTracks();
        }

        function deleteSelectedMusic() {
            if (musicState.selectedIds.size === 0) {
                updateMusicStatusLabel("No tracks selected");
                return;
            }
            const ids = Array.from(musicState.selectedIds);
            Promise.all(ids.map(id => deleteMusicTrack(id)))
                .finally(() => {
                    musicState.selectedIds.clear();
                    musicState.currentId = null;
                    musicState.selectMode = false;
                    loadMusicForDoc(musicState.docName);
                });
        }

        function deleteAllMusic() {
            if (musicState.tracks.length === 0) return;
            const ids = musicState.tracks.map(track => track.id);
            Promise.all(ids.map(id => deleteMusicTrack(id)))
                .finally(() => {
                    musicState.selectedIds.clear();
                    musicState.currentId = null;
                    musicState.selectMode = false;
                    loadMusicForDoc(musicState.docName);
                });
        }

        function getSelectedMusicTracks() {
            return musicState.tracks.filter(track => musicState.selectedIds.has(track.id));
        }

        function handleMusicDownloads(tracks) {
            if (!tracks || tracks.length === 0) {
                updateMusicStatusLabel("No tracks to download");
                return;
            }
            if (musicState.downloading) return;
            musicState.downloading = true;
            const total = tracks.length;
            const fill = document.getElementById("musicProgressFill");
            const label = document.getElementById("musicProgressLabel");
            let completed = 0;
            if (fill) fill.style.width = "0%";
            if (label) label.textContent = `Downloading 0 / ${total}`;
            const run = async () => {
                for (const track of tracks) {
                    await triggerTrackDownload(track);
                    completed++;
                    const ratio = completed / total;
                    if (fill) fill.style.width = `${ratio * 100}%`;
                    if (label) label.textContent = `Downloading ${completed} / ${total}`;
                }
                if (label) label.textContent = "Download complete";
            };
            run()
                .catch(() => updateMusicStatusLabel("Download interrupted"))
                .finally(() => {
                    musicState.downloading = false;
                    setTimeout(updateMusicGlobalIndicator, 800);
                });
        }

        function triggerTrackDownload(track) {
            return new Promise(resolve => {
                const anchor = document.createElement("a");
                anchor.href = track.downloadUrl || track.url;
                anchor.download = track.name;
                document.body.appendChild(anchor);
                anchor.click();
                document.body.removeChild(anchor);
                updateTrackStatus(track, "Download started");
                setTimeout(() => {
                    updateTrackStatus(track, "Downloaded");
                    resolve();
                }, 400);
            });
        }

        function updateTrackStatus(track, text) {
            track.status = text;
            if (track.downloadStatusEl) {
                track.downloadStatusEl.textContent = text;
            }
        }

        function removeTrackFromState(id) {
            musicState.tracks = musicState.tracks.filter(track => track.id !== id);
            musicState.selectedIds.delete(id);
            if (musicState.currentId === id) {
                musicState.currentId = null;
            }
            renderMusicTracks();
        }

        function deleteMusicTrack(id, options = {}) {
            if (options.skipServer) {
                removeTrackFromState(id);
                return Promise.resolve();
            }
            return fetch(`/music_tracks/${id}`, { method: "DELETE" })
                .then(res => {
                    if (!res.ok) throw new Error("delete failed");
                    removeTrackFromState(id);
                })
                .catch(() => updateMusicStatusLabel("Could not delete track"));
        }

        function updateMusicSelection(id, checked) {
            if (checked) {
                musicState.selectedIds.add(id);
            } else {
                musicState.selectedIds.delete(id);
            }
        }

        function updateMusicGlobalIndicator() {
            const fill = document.getElementById("musicProgressFill");
            const label = document.getElementById("musicProgressLabel");
            const total = musicState.tracks.length;
            if (!label || !fill) return;
            if (total === 0) {
                label.textContent = "0 / 0";
                fill.style.width = "0%";
                return;
            }
            const idx = musicState.tracks.findIndex(track => track.id === musicState.currentId);
            const display = idx >= 0 ? idx + 1 : 0;
            label.textContent = `${display} / ${total}`;
            fill.style.width = `${(display / total) * 100}%`;
        }

        function updateMusicSectionStatus() {
            const status = document.getElementById("musicLibraryStatus");
            if (!status) return;
            const total = musicState.tracks.length;
            status.textContent = total === 0 ? "Upload a music file to preview it here" : `${total} track${total === 1 ? "" : "s"} ready`;
        }

        function ensureMusicSectionVisibility() {
            const section = document.getElementById("musicSection");
            if (!section) return;
            section.hidden = musicState.tracks.length === 0;
        }

        function updateMusicStatusLabel(text) {
            const status = document.getElementById("musicLibraryStatus");
            if (status) status.textContent = text;
        }

        function playNextMusic(refId) {
            if (musicState.tracks.length === 0) return;
            const currentId = refId || musicState.currentId;
            let idx = musicState.tracks.findIndex(track => track.id === currentId);
            if (idx === -1) {
                idx = musicState.tracks.findIndex(track => track.id === musicState.currentId);
            }
            const nextIdx = (idx >= 0 && idx + 1 < musicState.tracks.length) ? idx + 1 : -1;
            if (nextIdx >= 0) {
                const nextTrack = musicState.tracks[nextIdx];
                playMusicTrack(nextTrack);
            } else {
                musicState.currentId = null;
                updateMusicButtons();
                updateMusicGlobalIndicator();
            }
        }

        function setColor(color) {
            paper.focus(); // Ensure focus
            document.execCommand("foreColor", false, color);
        }

        function highlight() {
            paper.focus();
            document.execCommand("hiliteColor", false, "#fff59d");
        }

        /* Markdown Detection */
        paper.addEventListener("keydown", e => {
            if (!markdownMode || (e.key !== " " && e.key !== "Enter")) return;

            const sel = window.getSelection();
            const node = sel.anchorNode;
            if (!node || node.nodeType !== 3) return;

            const text = node.textContent;
            const match = text.match(/^(#{1,3})\s$/);

            if (match) {
                e.preventDefault();
                const level = match[1].length;
                document.execCommand("selectAll", false);
                document.execCommand("delete", false);
                document.execCommand("formatBlock", false, "h" + level);
            }
        });

        function updateCount() {
            const lines = paper.innerText.split("\n").length;
            count.textContent = `${lines} lines`;
        }

        /* Focus on Click */
        paper.addEventListener("click", e => {
            if (e.target === paper) {
                article.focus();
                // Move cursor to end
                const range = document.createRange();
                range.selectNodeContents(article);
                range.collapse(false);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
        });

        /* Autosave Logic */
        paper.addEventListener("input", () => {
            if (current && !sourceMode) {
                docs[current] = paper.innerHTML;
                isDirty = true;
            }
            updateCount();
            localStorage.setItem("docs", JSON.stringify(docs));

            // Debounced Cloud Sync
            if (current) {
                clearTimeout(saveTimeout);
                status.textContent = "Syncing...";
                saveTimeout = setTimeout(() => {
                    saveServer();
                }, 2000); // 2 second debounce
            }
        });

        /* Shortcuts */
        document.addEventListener("keydown", e => {
            const k = e.key.toLowerCase();
            const mod = e.ctrlKey || e.metaKey;

            if (!mod) return;

            switch (k) {
                case "n":
                    e.preventDefault();
                    newDoc();
                    break;

                case "s":
                    e.preventDefault();
                    if (e.shiftKey) saveServer();
                    else downloadDoc();
                    break;

                case "o":
                    e.preventDefault();
                    openServerList();
                    break;

                case "f":
                    e.preventDefault();
                    document.getElementById("findTxt").focus();
                    break;

                case "h":
                    e.preventDefault();
                    document.getElementById("replaceTxt").focus();
                    break;

                case "m":
                    e.preventDefault();
                    toggleMarkdown();
                    break;

                case "p":
                    e.preventDefault();
                    window.print();
                    break;

                case "b":
                    e.preventDefault();
                    document.execCommand("bold");
                    break;

                case "i":
                    e.preventDefault();
                    document.execCommand("italic");
                    break;

                case "u":
                    e.preventDefault();
                    document.execCommand("underline");
                    break;

                case "g":
                    e.preventDefault();
                    insertGroup();
                    break;

                case "l":
                    e.preventDefault();
                    highlight();
                    break;

                case "w": // Try to override Close Tab (doesn't work in all browsers)
                case "q": // Alternative
                    e.preventDefault();
                    if (current) closeDoc(current);
                    break;
            }
        });

        /* Init */
      window.onload = function () {
    // Restore Theme
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }

    // Restore Background
    if (localStorage.getItem('hide-bg') === 'true') {
        document.body.classList.add('hide-bg');
    }

    // Fetch doc list from backend and open last opened doc only
    (async function() {
        try {
            const lRes = await fetch('/list');
            const files = await lRes.json();
            if (files.length > 0) {
                // Build docs map from server list
                docs = {};
                files.forEach(f => { docs[f] = null; });
                closedDocs = closedDocs.filter(d => docs[d] !== undefined);
                saveClosedDocs();

                // Only open if user previously had a doc open
                const stored = localStorage.getItem("currentDoc");
                if (stored && docs[stored] !== undefined && !isClosedDoc(stored)) {
                    current = stored;
                    renderTabs();
                    await openDoc(current);
                } else {
                    current = null;
                    renderTabs();
                    article.innerHTML = "";
                    article.contentEditable = "false";
                    status.textContent = "Ready";
                }
            } else {
                closedDocs = [];
                saveClosedDocs();
                current = null;
                localStorage.removeItem("currentDoc");
                article.innerHTML = "";
                article.contentEditable = "false";
                renderTabs();
                status.textContent = "Ready";
            }
        } catch (e) {
            article.innerHTML = "";
            status.textContent = "Ready: No document";
        }
        lucide.createIcons();
        syncWithServer();
    })();
};

        async function syncWithServer() {
            if (isSyncing) return;
            isSyncing = true;

            try {
            const res = await fetch("/last_modified");
            const m = await res.json();

            if (m.last_mod !== lastSyncTime) {
                const lRes = await fetch("/list");
                let files = await lRes.json();

                    // Remove docs no longer on server
                    Object.keys(docs).forEach(d => {
                        if (!files.includes(d)) delete docs[d];
                    });

                // Add new files as null (unloaded)
                files.forEach(f => {
                    if (!docs[f]) docs[f] = null;
                });

                // Clean up closed docs that no longer exist
                closedDocs = closedDocs.filter(d => docs[d] !== undefined);
                saveClosedDocs();

                    // Fetch and display content for current doc if not loaded
                    if (current && (docs[current] === null || docs[current] === undefined)) {
                        try {
                            const res = await fetch("/open", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ name: current })
                            });
                            if (res.ok) {
                                const data = await res.json();
                                docs[current] = data.content || "";
                                article.innerHTML = docs[current];
                                syncPdfShelfFromArticle();
                                syncEpubShelfFromArticle();
                            }
                        } catch (e) {
                            article.innerHTML = "";
                        }
                    } else if (current && docs[current] !== undefined) {
                        article.innerHTML = docs[current];
                        syncPdfShelfFromArticle();
                        syncEpubShelfFromArticle();
                    }

                    renderTabs();
                    lastSyncTime = m.last_mod;
                    localStorage.setItem("docs", JSON.stringify(docs));
                }
            } catch (e) {
                console.error("Sync error:", e);
            } finally {
                isSyncing = false;
                setTimeout(syncWithServer, 10000);
            }
        }

        function initVideoControls() {
            // Initialize resizers
            document.querySelectorAll('.resizer').forEach(resizer => {
                if (resizer.dataset.handled) return;
                const container = resizer.parentElement;

                let startX, startWidth;

                const startResize = (e) => {
                    const point = e.type === 'touchstart' ? e.touches[0] : e;
                    startX = point.clientX;
                    startWidth = container.offsetWidth;

                    document.body.classList.add('resizing');
                    paper.style.pointerEvents = "none";

                    const resizing = (ev) => {
                        if (ev.type === 'touchmove') ev.preventDefault();
                        const p = ev.type === 'touchmove' ? ev.touches[0] : ev;
                        const diff = p.clientX - startX;
                        container.style.width = (startWidth + diff) + 'px';
                    };

                    const endResize = () => {
                        document.body.classList.remove('resizing');
                        paper.style.pointerEvents = "auto";
                        window.removeEventListener('mousemove', resizing, { capture: true });
                        window.removeEventListener('mouseup', endResize, { capture: true });
                        window.removeEventListener('touchmove', resizing, { capture: true });
                        window.removeEventListener('touchend', endResize, { capture: true });

                        // Sync new size to server
                        saveServer();
                    };

                    window.addEventListener('mousemove', resizing, { capture: true });
                    window.addEventListener('mouseup', endResize, { capture: true });
                    window.addEventListener('touchmove', resizing, { capture: true, passive: false });
                    window.addEventListener('touchend', endResize, { capture: true });
                };

                resizer.addEventListener('mousedown', startResize);
                resizer.addEventListener('touchstart', startResize);
                resizer.dataset.handled = "true";
            });

            // Initialize movers
            document.querySelectorAll('.mover').forEach(mover => {
                if (mover.dataset.handled) return;
                const container = mover.parentElement;

                let startX, startY, startLeft, startTop;

                const startMove = (e) => {
                    e.preventDefault();
                    const point = e.type === 'touchstart' ? e.touches[0] : e;
                    startX = point.clientX;
                    startY = point.clientY;

                    // Switch to absolute if not already
                    if (window.getComputedStyle(container).position !== 'absolute') {
                        const rect = container.getBoundingClientRect();
                        const paperRect = paper.getBoundingClientRect();
                        container.style.position = 'absolute';
                        container.style.left = (rect.left - paperRect.left) + 'px';
                        container.style.top = (rect.top - paperRect.top + paper.scrollTop) + 'px';
                        container.style.margin = '0';
                    }

                    startLeft = parseFloat(container.style.left) || 0;
                    startTop = parseFloat(container.style.top) || 0;

                    container.classList.add('dragging');
                    document.body.classList.add('resizing'); // Shield
                    paper.style.pointerEvents = "none";

                    const moving = (ev) => {
                        if (ev.type === 'touchmove') ev.preventDefault();
                        const p = ev.type === 'touchmove' ? ev.touches[0] : ev;
                        const dx = p.clientX - startX;
                        const dy = p.clientY - startY;
                        container.style.left = (startLeft + dx) + 'px';
                        container.style.top = (startTop + dy) + 'px';
                    };

                    const endMove = () => {
                        container.classList.remove('dragging');
                        document.body.classList.remove('resizing');
                        paper.style.pointerEvents = "auto";
                        window.removeEventListener('mousemove', moving, { capture: true });
                        window.removeEventListener('mouseup', endMove, { capture: true });
                        window.removeEventListener('touchmove', moving, { capture: true });
                        window.removeEventListener('touchend', endMove, { capture: true });

                        // Sync new position to server
                        saveServer();
                    };

                    window.addEventListener('mousemove', moving, { capture: true });
                    window.addEventListener('mouseup', endMove, { capture: true });
                    window.addEventListener('touchmove', moving, { capture: true, passive: false });
                    window.addEventListener('touchend', endMove, { capture: true });
                };

                mover.addEventListener('mousedown', startMove);
                mover.addEventListener('touchstart', startMove);
                mover.dataset.handled = "true";
            });
        }

    </script>
    <script>
        let _videoObserver = null;
        let _activeLocalContainer = null;

        function ensureVideoObserver() {
            if (!('IntersectionObserver' in window)) return;
            if (!_videoObserver) {
                _videoObserver = new IntersectionObserver(
                    (entries) => {
                        entries.forEach(entry => {
                            const container = entry.target;
                            const video = container.querySelector('video');
                            if (!video) return;

                            // Keep local videos playing even when scrolled (no auto-pause)
                            if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
                                _activeLocalContainer = container;
                            }
                        });
                    },
                    { threshold: [0.6] }
                );
            }

            document.querySelectorAll('.video-container').forEach(c => _videoObserver.observe(c));
        }

        (() => {
            let lastTap = 0;

            /* ===============================
               DOUBLE TAP / DOUBLE CLICK
            =============================== */
            document.addEventListener('click', (e) => {
                const container = e.target.closest('.video-container');
                if (!container) return;

                const now = Date.now();
                if (now - lastTap < 300) {
                    container.classList.toggle('cinematic');
                }
                lastTap = now;
            });

            /* ===============================
               AUTO-MUTE NON-FOCUSED VIDEOS
            =============================== */
            ensureVideoObserver();
        })();
    </script>
    <script>
        function cmd(command, value = null) {
            document.execCommand(command, false, value);
        }
    </script>
